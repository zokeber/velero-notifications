name: build and push container image

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "charts/**"

permissions:
  contents: read

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.semantic-version.outputs.version }}
      version_tag: ${{ steps.semantic-version.outputs.version_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Application version
        id: semantic-version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
  
  build-push-container-images:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64, linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ GITHUB.REPOSITORY }}:latest
            ghcr.io/${{ GITHUB.REPOSITORY }}:${{needs.build.outputs.version}}
            ghcr.io/${{ GITHUB.REPOSITORY }}:${{needs.build.outputs.version_tag}}
